{% extends 'catalog/base.html' %}
{% block content %}
<div class="container">
    <form class='row' method="post" enctype="multipart/form-data">
        <div class="row">
            <div class="col - 6">
                    <div class="card">
                        <div class="card-body">
                            {% csrf_token %}
                            {{ form.as_p }}
                            {{ form.name.errors }}
                            {{ form.description.errors }}
                            {{ form.price.errors }}
                        </div>
                        <button type="submit" class="btn btn-primary">
                            {% if object %}
                            Сохранить
                            {% else %}
                            Создать
                            {% endif%}
                        </button>
                    </div>
            </div>
        </div>
    </form>
</div>
{% endblock %}

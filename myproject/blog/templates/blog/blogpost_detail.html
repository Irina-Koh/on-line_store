{% extends 'blog/base.html' %}
{% load my_tags %}
{% block content %}
<div class="album py-5 bg-body-tertiary">
          <div class="container">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
              <div class="col">
                <div class="card shadow-sm">
                 <img src="{{ blogpost.preview_image | media_filter }}">
                  <div class="card-body">
                    <div class="card-text">
                        <p>{{object.title}}</p>
                        <p>{{object.content|truncatechars:100 }}</p>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                      <div class="btn-group">
                        <a class="btn btn-primary" href="{% url 'blog:blogpost_list' %}" role="button">Назад</a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
{% endblock %}

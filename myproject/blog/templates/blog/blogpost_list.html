{% extends 'blog/base.html' %}
{% load my_tags %}
{% block content %}
<div class="album py-5 bg-body-tertiary">
          <div class="container">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
              {% for blog in object_list %}
              <div class="col">
                <div class="card shadow-sm">
                  <img src="{{ blog.preview_image | media_filter }}">
                  <div class="card-body">
                    <h3 class="card-text">
                      {{blog.title }}
                      <p>{{blog.content}}</p>
                    </h3>
                    <div class="d-flex justify-content-between align-items-center">
                      <div class="btn-group">
                        <a class="btn btn-primary" href="{% url 'blog:blogpost_detail' blog.id %}" role="button">Показать</a>
                        <a class="btn btn-primary" href="{% url 'blog:blogpost_update' blog.id %}" role="button">Редактировать</a>
                        <a class="btn btn-primary" href="{% url 'blog:blogpost_delete' blog.id %}" role="button">Удалить</a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              {% endfor %}
            </div>
          </div>
        </div>
{% endblock %}
